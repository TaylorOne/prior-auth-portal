name: CI / CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "CI_TestDb@Passw0rd"
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'CI_TestDb@Passw0rd' -Q 'SELECT 1' -No"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PriorAuth.sln

      - name: Build
        run: dotnet build PriorAuth.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test PriorAuth.sln --no-restore --verbosity normal
        env:
          TEST_CONNECTION_STRING: "Server=localhost,1433;Database=PriorAuthDb_Test;User Id=SA;Password=CI_TestDb@Passw0rd;TrustServerCertificate=True;"

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore PriorAuth.sln

      - name: Apply EF Migrations
        run: dotnet ef database update --project PriorAuth.Data/PriorAuth.Data.csproj --startup-project PriorAuthApi/PriorAuthApi.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_MIGRATION_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish PriorAuthApi/PriorAuthApi.csproj --no-restore --configuration Release --output ./publish

      - name: Zip artifact
        run: cd publish && zip -r ../app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-prior-auth-dev
          package: app.zip

      # Azure Function Deploy
      - name: Publish Azure Function
        run: dotnet publish PriorAuthFunctions/PriorAuthFunctions.csproj --configuration Release --output ./func-publish

      - name: Zip Azure Function artifact
        run: cd func-publish && zip -r ../func.zip .

      - name: Deploy Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: func-prior-auth-dev
          package: func.zip