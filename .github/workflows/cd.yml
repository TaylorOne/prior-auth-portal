name: CD

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install EF Tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore
        run: dotnet restore PriorAuth.sln

      - name: Build
        run: dotnet build PriorAuth.sln --no-restore --configuration Release

      - name: Apply EF Migrations
        run: dotnet ef database update --project PriorAuthAPI/PriorAuthAPI.csproj --startup-project PriorAuthAPI/PriorAuthAPI.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}

      - name: Publish
        run: dotnet publish PriorAuthApi/PriorAuthApi.csproj --no-build --configuration Release --output ./publish

      - name: Zip artifact
        run: cd publish && zip -r ../app.zip .

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-prior-auth-dev
          package: app.zip