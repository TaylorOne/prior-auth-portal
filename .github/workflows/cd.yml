name: CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PriorAuth.sln

      - name: Build
        run: dotnet build PriorAuth.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test PriorAuth.sln --no-restore --verbosity normal

      - name: Publish
        run: dotnet publish PriorAuthApi/PriorAuthApi.csproj --no-build --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-prior-auth-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish