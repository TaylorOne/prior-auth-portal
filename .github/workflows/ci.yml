name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore PriorAuth.sln

      - name: Build
        run: dotnet build PriorAuth.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test PriorAuth.sln --no-restore --verbosity normal
