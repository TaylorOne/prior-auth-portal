name: CD Frontend

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: PriorAuthWeb

      - name: Validate frontend auth config
        run: |
          test -n "$VITE_API_URL"
          test -n "$VITE_AZURE_CLIENT_ID"
          test -n "$VITE_AZURE_TENANT_ID"
          test -n "$VITE_AZURE_API_CLIENT_ID"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.VITE_AZURE_API_CLIENT_ID }}

      - name: Build
        run: npm run build
        working-directory: PriorAuthWeb
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_AZURE_CLIENT_ID: ${{ secrets.VITE_AZURE_CLIENT_ID }}
          VITE_AZURE_TENANT_ID: ${{ secrets.VITE_AZURE_TENANT_ID }}
          VITE_AZURE_API_CLIENT_ID: ${{ secrets.VITE_AZURE_API_CLIENT_ID }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: PriorAuthWeb/dist
          output_location: ""
          skip_app_build: true
